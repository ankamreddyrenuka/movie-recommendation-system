services:
  - type: web_service
    name: cinematch-ai
    env: java
    plan: starter
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/movie-recommendation-system-1.0.0.jar
    autoDeploy: true
    envVars:
      - key: TMDB_API_KEY
        generator: secret
      - key: OMDB_API_KEY
        generator: secret
    routes:
      - type: web
