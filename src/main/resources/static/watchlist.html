<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI | Watchlist</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">CineMatch AI</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
            <a href="/recommendations.html">Recommendations</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Favorites</a>
            <a href="/watchlist.html">Watchlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Watchlist</h1>
                <p>Build, update, and mark your movie queue as watched or unwatched.</p>
            </div>
        </section>

        <section class="form-card glass">
            <h3>Add to Watchlist</h3>
            <div class="input-grid">
                <input id="watchlistMovieId" placeholder="Movie ID">
                <input id="watchlistTitle" placeholder="Title">
                <input id="watchlistPoster" placeholder="Poster URL">
                <input id="watchlistStatus" placeholder="Status (To Watch / Watching / Completed)">
                <input id="watchlistNotes" placeholder="Notes">
            </div>
            <button id="saveWatchlist" class="primary-button">Add to Watchlist</button>
        </section>

        <section class="results-grid" id="watchlistItems"></section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/watchlist.js"></script>
</body>
</html>
