<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelDNA | Wishlist</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">TravelDNA</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
            <a href="/recommendations.html">Recommendations</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Saved Trips</a>
            <a href="/watchlist.html">Wishlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Wishlist</h1>
                <p>Keep a wishlist of destinations you'd like to visit.</p>
            </div>
        </section>

        <section class="form-card glass">
            <h3>Add to Wishlist</h3>
            <div class="input-grid">
                <input id="watchlistDestinationId" placeholder="Destination ID">
                <input id="watchlistTitle" placeholder="Name">
                <input id="watchlistPoster" placeholder="Image URL">
                <input id="watchlistStatus" placeholder="Priority (Low / Normal / High)">
                <input id="watchlistNotes" placeholder="Notes">
            </div>
            <button id="saveWatchlist" class="primary-button">Add to Wishlist</button>
        </section>

        <section class="results-grid" id="watchlistItems"></section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/watchlist.js"></script>
</body>
</html>
