<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI | Favorites</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">CineMatch AI</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
            <a href="/recommendations.html">Recommendations</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Favorites</a>
            <a href="/watchlist.html">Watchlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Favorites</h1>
                <p>Manage your list of saved movies and keep your next watchlist curated.</p>
            </div>
        </section>

        <section class="form-card glass">
            <h3>Add to Favorites</h3>
            <div class="input-grid">
                <input id="favoriteMovieId" placeholder="Movie ID">
                <input id="favoriteTitle" placeholder="Title">
                <input id="favoritePoster" placeholder="Poster URL">
                <input id="favoriteGenres" placeholder="Genres (comma-separated)">
                <input id="favoriteRating" placeholder="Rating" type="number" step="0.1">
                <input id="favoriteRelease" placeholder="Release Date">
            </div>
            <button id="saveFavorite" class="primary-button">Save Favorite</button>
        </section>

        <section class="results-grid" id="favoritesList"></section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/favorites.js"></script>
</body>
</html>
