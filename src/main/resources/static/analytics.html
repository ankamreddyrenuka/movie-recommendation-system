<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelDNA | Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">TravelDNA</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
<a href="/recommendations.html">Trip Planner</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Saved Trips</a>
            <a href="/watchlist.html">Wishlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Travel Analytics</h1>
                <p>Interactive charts that visualize tags, ratings, popularity, and region trends.</p>
            </div>
        </section>

        <section class="dashboard-grid">
<div class="widget glass"><h3>Interest Distribution</h3><canvas id="genreChart"></canvas></div>
<div class="widget glass"><h3>Trip Duration Analysis</h3><canvas id="ratingsChart"></canvas></div>
<h3>Country Distribution</h3>
<canvas id="topDestinationsChart"></canvas>
            <div class="widget full glass"><h3>Region Trend</h3><canvas id="yearTrendChart"></canvas></div>
        </section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
