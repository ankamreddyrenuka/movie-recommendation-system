<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI | Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">CineMatch AI</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
            <a href="/recommendations.html">Recommendations</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Favorites</a>
            <a href="/watchlist.html">Watchlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Analytics Dashboard</h1>
                <p>Interactive charts that visualize ratings, genres, popularity, and release year trends.</p>
            </div>
        </section>

        <section class="dashboard-grid">
            <div class="widget glass"><h3>Genre Distribution</h3><canvas id="genreChart"></canvas></div>
            <div class="widget glass"><h3>Ratings Histogram</h3><canvas id="ratingsChart"></canvas></div>
            <div class="widget glass"><h3>Popularity Overview</h3><canvas id="popularityChart"></canvas></div>
            <div class="widget glass"><h3>Top Movies</h3><canvas id="topMoviesChart"></canvas></div>
            <div class="widget full glass"><h3>Release Year Trend</h3><canvas id="yearTrendChart"></canvas></div>
        </section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
