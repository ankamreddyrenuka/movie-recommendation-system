
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelDNA | Compare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar glass">
        <div class="brand">TravelDNA</div>
        <nav class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/search.html">Search</a>
            <a href="/recommendations.html">Recommendations</a>
            <a href="/analytics.html">Analytics</a>
            <a href="/favorites.html">Saved Trips</a>
            <a href="/watchlist.html">Wishlist</a>
            <a href="/compare.html">Compare</a>
        </nav>
        <button id="themeToggle" class="theme-button">Dark</button>
    </header>

    <main>
        <section class="page-header glass">
            <div>
                <h1>Destination Comparison</h1>
                <p>Compare two destinations by rating, popularity, and recommended duration.</p>
            </div>
        </section>

        <section class="form-card glass">
            <div class="input-grid">
                <input id="compareIdA" placeholder="First Destination ID">
                <input id="compareIdB" placeholder="Second Destination ID">
            </div>
            <button id="compareButton" class="primary-button">Compare</button>
        </section>

        <section id="compareResults" class="compare-grid"></section>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/compare.js"></script>
</body>
</html>
