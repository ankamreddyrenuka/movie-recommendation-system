spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:traveldnadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

# Use SPRING_DATASOURCE_URL and SPRING_DATASOURCE_DRIVER_CLASS_NAME to switch to MySQL in production.
# Example MySQL values:
# SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/traveldna
# SPRING_DATASOURCE_USERNAME=root
# SPRING_DATASOURCE_PASSWORD=password
# SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
